<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React 考え方ラボ</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c232c;
    --line:#2a313c; --line-soft:#222831;
    --ink:#e8edf4; --ink-2:#9aa7b8; --ink-3:#5f6b7c;
    --react:#61dafb; --react-deep:#1b8fb0;
    --ok:#3fb950; --ok-bg:rgba(63,185,80,.12);
    --warn:#d29922; --bad:#f85149; --bad-bg:rgba(248,81,73,.10);
    --pick:rgba(97,218,251,.10);
    --kw:#c792ea; --fn:#82aaff; --str:#9ece6a; --par:#f78c6c; --cm:#5c6776;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono','Menlo',monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
  }
  /* Next.js 編: モノクロ基調に切り替え（React 編と一目で別物に） */
  body.next-theme{
    --bg:#000000; --panel:#0c0c0c; --panel-2:#161616;
    --line:#2a2a2a; --line-soft:#1e1e1e;
    --ink:#fafafa; --ink-2:#a1a1a1; --ink-3:#6e6e6e;
    --react:#ffffff; --react-deep:#8a8a8a;       /* アクセント=白 */
    --ok:#5eead4; --ok-bg:rgba(94,234,212,.10);
    --warn:#e5b567; --bad:#ff6369; --bad-bg:rgba(255,99,105,.10);
    --pick:rgba(255,255,255,.08);
    --kw:#d6bcfa; --fn:#9bbcf2; --str:#a3e3b8; --par:#f2b58c; --cm:#5a5a5a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.7;font-size:15px}
  body{padding:0 20px 90px}
  .wrap{max-width:780px;margin:0 auto}
  a{color:inherit;text-decoration:none;cursor:pointer}

  /* top breadcrumb */
  .top{display:flex;align-items:center;gap:8px;padding:22px 2px 0;font-size:13px;color:var(--ink-3)}
  .top .crumb{color:var(--ink-2)} .top .crumb:hover{color:var(--react)}
  .top .sep{opacity:.5} .top .here{color:var(--react)}
  .atom{width:22px;height:22px;flex:none}
  .atom .orb{fill:none;stroke:var(--react);stroke-width:5}
  .atom .nuc{fill:var(--react)}

  code{font-family:var(--mono);font-size:.88em;background:var(--panel-2);
    padding:2px 6px;border-radius:5px;color:var(--react)}
  h2.sec{font-size:13px;font-family:var(--mono);color:var(--ink-3);letter-spacing:1px;
    text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  h2.sec::before{content:"";width:18px;height:2px;background:var(--react)}
  p{color:var(--ink-2);margin-bottom:14px}
  p strong,.ink{color:var(--ink);font-weight:600}
  section{margin:34px 0}

  /* ============ HOME ============ */
  .home-hero{padding:40px 0 26px;border-bottom:1px solid var(--line-soft);margin-bottom:30px}
  .gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.gate-grid{grid-template-columns:1fr}}
  .gate{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line-soft);
    border-radius:16px;padding:24px 22px;transition:.18s;cursor:pointer;position:relative;overflow:hidden}
  .gate:hover{transform:translateY(-2px);border-color:var(--react)}
  .gate.react:hover{border-color:#61dafb}
  .gate.next:hover{border-color:#fafafa}
  .gate-logo{width:40px;height:40px;margin-bottom:14px}
  .gate-logo .atom{width:40px;height:40px}
  .gate.react .atom .orb{stroke:#61dafb} .gate.react .atom .nuc{fill:#61dafb}
  .gate-nm{font-size:20px;font-weight:700;margin-bottom:8px;font-family:var(--mono)}
  .gate-ds{font-size:13px;color:var(--ink-2);line-height:1.6;flex:1;margin-bottom:14px}
  .gate-meta{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);margin-bottom:10px}
  .gate-go{font-size:13px;color:var(--react);font-weight:600}
  .gate.react .gate-go{color:#61dafb}
  .home-hero .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .home-hero .brand .atom{width:30px;height:30px}
  .home-hero .brand span{font-family:var(--mono);font-size:15px;color:var(--ink-2)}
  .home-hero h1{font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1.2;margin-bottom:14px}
  .home-hero h1 b{color:var(--react)}
  .home-hero .lede{font-size:17px;color:var(--ink-2);max-width:620px}
  .cat-label{font-family:var(--mono);font-size:12px;color:var(--react-deep);
    letter-spacing:1px;text-transform:uppercase;margin:30px 0 14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .tech{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;
    padding:18px 20px;transition:.15s}
  .tech:hover{border-color:var(--react);background:var(--panel-2);transform:translateY(-1px)}
  .tech.soon{opacity:.5;pointer-events:none}
  .tech .nm{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--ink)}
  .tech .nm b{color:var(--react)}
  .tech .ds{font-size:13px;color:var(--ink-3);margin-top:6px;line-height:1.5}
  .tech .ct{font-size:11px;color:var(--react-deep);margin-top:10px;font-family:var(--mono)}
  .tech.soon .ct{color:var(--ink-3)}
  .refgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  @media(max-width:600px){.refgrid{grid-template-columns:1fr}}
  .reftech{background:var(--panel);border:1px solid var(--line-soft);border-radius:10px;
    padding:11px 14px;display:flex;flex-direction:column;gap:3px}
  .refnm{font-family:var(--mono);font-size:13px;color:var(--ink-2)}
  .refds{font-size:11.5px;color:var(--ink-3);line-height:1.5}

  /* ============ CONCEPT ============ */
  .hero{padding:30px 0 8px;border-bottom:1px solid var(--line-soft);margin-bottom:30px}
  .kicker{font-family:var(--mono);font-size:12px;color:var(--react-deep);
    letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
  .hero h1{font-size:40px;font-weight:700;letter-spacing:-1px;margin-bottom:14px;
    font-family:var(--mono)}
  .hero h1 .p{color:var(--react)}
  .lede{font-size:18px;color:var(--ink-2);line-height:1.6;max-width:620px}
  .tags{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
  .tag{font-size:12px;padding:4px 11px;border-radius:999px;border:1px solid var(--line);
    color:var(--ink-2);background:var(--panel)}
  .tag.cat{background:var(--pick);border-color:var(--react);color:var(--react)}
  .def{background:var(--panel);border:1px solid var(--line-soft);border-left:3px solid var(--react);
    border-radius:0 12px 12px 0;padding:20px 22px;font-size:17px;color:var(--ink);line-height:1.6}
  .def b{color:var(--react);font-weight:600}
  .code{background:#0a0e14;border:1px solid var(--line-soft);border-radius:12px;
    padding:18px 20px;font-family:var(--mono);font-size:13px;line-height:2;overflow-x:auto;margin:8px 0}
  .code .ln{white-space:pre;display:block}
  .kw{color:var(--kw)} .fn{color:var(--fn)} .str{color:var(--str)} .par{color:var(--par)} .cm{color:var(--cm)}
  .code .hl{background:var(--pick);border-radius:4px;padding:0 3px}
  .cap{font-size:13px;color:var(--ink-3);margin-top:8px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.cols{grid-template-columns:1fr}}
  .col{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:18px 20px}
  .col h3{font-size:14px;margin-bottom:12px} .col.yes h3{color:var(--ok)} .col.no h3{color:var(--bad)}
  .col ul{list-style:none}
  .col li{font-size:14px;color:var(--ink-2);padding:6px 0 6px 22px;position:relative;line-height:1.5}
  .col.yes li::before{content:"✓";position:absolute;left:0;color:var(--ok);font-weight:700}
  .col.no li::before{content:"✕";position:absolute;left:0;color:var(--bad);font-weight:700}
  .miss{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:4px 0}
  .miss .row{padding:16px 20px;border-bottom:1px solid var(--line-soft)}
  .miss .row:last-child{border-bottom:none}
  .miss .bad{color:var(--bad);font-size:14px;font-weight:600;margin-bottom:6px}
  .miss .fix{font-size:14px;color:var(--ink-2);line-height:1.55}

  .learn-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:600px){.learn-cards{grid-template-columns:1fr}}
  .lcard{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;
    padding:16px 18px;transition:.15s}
  .lcard:hover{border-color:var(--react);background:var(--panel-2);transform:translateY(-1px)}
  .lcard.ready{border-color:var(--react-deep)}
  .lcard.soon{opacity:.5;pointer-events:none}
  .lcard .dnum{font-family:var(--mono);font-size:12px;color:var(--react-deep)}
  .lcard .dttl{font-size:15px;font-weight:600;color:var(--ink);margin:5px 0 4px}
  .lcard .dsub{font-size:12.5px;color:var(--ink-3);line-height:1.45}
  .lcard .darrow{color:var(--react);font-size:13px;margin-top:10px}
  .lcard.soon .darrow{color:var(--ink-3)}

  /* ============ LESSON (5 steps) ============ */
  .lesson-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px;flex-wrap:wrap}
  .lesson-head .concept{font-family:var(--mono);font-size:12px;color:var(--react);
    background:var(--pick);padding:3px 10px;border-radius:6px}
  .lesson-head .nm{font-size:12px;color:var(--ink-2)}
  .lesson-head .sc{font-size:12px;color:var(--ink-3)}
  .stage{display:grid;grid-template-columns:1fr 1.1fr;gap:14px;align-items:start;margin-top:8px}
  @media(max-width:720px){.stage{grid-template-columns:1fr}}
  .rail{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:8px}
  .rail-head{padding:10px 12px 12px}
  .rail-head .t{font-size:13px;font-weight:600} .rail-head .s{font-size:11.5px;color:var(--ink-3)}
  .step{display:flex;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;align-items:flex-start}
  .step:hover{background:var(--panel-2)} .step.cur{background:var(--panel-2)}
  .step .num{flex:none;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;
    font-size:12px;font-family:var(--mono);font-weight:600;border:1px solid var(--line);
    color:var(--ink-3);background:var(--bg)}
  .step.cur .num{border-color:var(--react);color:var(--react);background:var(--pick)}
  .step.done .num{border-color:var(--ok);color:#0d1117;background:var(--ok)}
  .step .lbl{font-size:13px;font-weight:500;color:var(--ink);line-height:1.35}
  .step.locked .lbl{color:var(--ink-3)} .step.cur .lbl{color:var(--react)}
  .step .sub2{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .connector{height:8px;width:1px;background:var(--line);margin-left:23px}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;
    padding:20px;min-height:430px;display:flex;flex-direction:column}
  .eyebrow{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--react-deep);
    font-weight:600;margin-bottom:8px;font-family:var(--mono)}
  .prompt{font-size:15px;line-height:1.6;color:var(--ink)}
  .prompt code{font-size:13px;background:var(--panel-2)} .prompt b{color:#fff;font-weight:600}
  .codeblock{background:#0a0e14;border:1px solid var(--line-soft);border-radius:10px;
    padding:14px 16px;font-family:var(--mono);font-size:12.5px;line-height:1.95;margin:16px 0;overflow-x:auto}
  .codeblock .ln{white-space:pre;display:block}
  .mut{color:var(--ink-3)}
  .blank{background:#2a3340;border:1px dashed #3d4a5c;border-radius:4px;padding:0 8px;color:var(--react)}
  .fill-anim{animation:fill .4s ease}
  @keyframes fill{from{background:var(--pick);transform:scale(1.04)}to{background:transparent;transform:none}}
  .q{font-size:12px;color:var(--ink-3);margin:4px 0 10px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;color:var(--ink);font-family:var(--mono);font-size:13px;
    transition:.13s;display:flex;justify-content:space-between;align-items:center;gap:10px;line-height:1.45}
  .opt:hover:not(.dis){border-color:var(--react-deep);background:#20272f}
  .opt .ic{font-style:normal;flex:none;opacity:0}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)} .opt.correct .ic{opacity:1;color:var(--ok)}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)} .opt.wrong .ic{opacity:1;color:var(--bad)}
  .opt.dis{cursor:default;opacity:.55} .opt.dis.correct,.opt.dis.wrong{opacity:1}
  .why{background:var(--panel-2);border:1px solid var(--line-soft);border-left:3px solid var(--warn);
    border-radius:0 10px 10px 0;padding:13px 15px;opacity:0;max-height:0;overflow:hidden;transition:.3s}
  .why.show{opacity:1;max-height:340px;margin-top:16px}
  .why .h{font-size:12px;font-weight:600;color:var(--warn);margin-bottom:6px}
  .why p{font-size:13px;line-height:1.65;color:var(--ink-2);margin:0}
  .why code{font-size:12px;background:var(--bg)}
  .spacer{flex:1}
  .nav{display:flex;gap:10px;margin-top:18px}
  .btn{font-family:var(--sans);font-size:13.5px;border-radius:9px;padding:11px 16px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel-2);color:var(--ink-2);transition:.13s;font-weight:500}
  .btn:hover{border-color:var(--react-deep);color:var(--ink)}
  .btn.primary{flex:1;background:var(--react);color:#08222b;border-color:var(--react);font-weight:600}
  .btn.primary:hover{background:#7be3fc}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.primary:disabled{background:var(--panel-2);color:var(--ink-3);border-color:var(--line)}
  .done-banner{text-align:center;padding:40px 20px}
  .done-banner .big{font-size:40px;margin-bottom:8px}
  .done-banner h3{font-size:17px;margin-bottom:6px}
  .done-banner p{font-size:13px;color:var(--ink-2);max-width:400px;margin:0 auto 20px}

  .backline{margin-top:36px;padding-top:22px;border-top:1px solid var(--line-soft)}
  .backline a{font-size:13px;color:var(--ink-2)} .backline a:hover{color:var(--react)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top" id="crumb"></div>
  <div id="view"></div>
</div>

<script>
/* ============================================================
   データ
   ============================================================ */
const DATA = {
  useState: {
    name:"useState",
    cat:"State / 状態を持つ",
    tagline:"コンポーネントに「覚えておく値」を持たせる、最も基本のフック。",
    lede:"ユーザーの操作で変わり、変わったら画面も描き直したい値は、これで管理する。",
    def:'画面に表示され、<b>時間とともに変わる値</b>をコンポーネントに記憶させる。値を更新すると、React が<b>自動でその部分を描き直す</b>。',
    why:[
      'ふつうの変数 <code>let count = 0</code> に代入しても画面は変わらない。React は「描画は状態から決まる」前提なので、変化を画面に反映するには <strong>React に変化を知らせる仕組み</strong>が要る。それが useState。',
      'useState は<strong>2つを1組で</strong>返す —— いまの値と、それを更新する関数。更新関数を呼ぶと React が再描画を予約する。'
    ],
    code:[
      '<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">\'react\'</span>;',
      '',
      '<span class="kw">function</span> <span class="fn">Counter</span>() {',
      '  <span class="cm">// [ いまの値 , 更新する関数 ] = useState( 初期値 )</span>',
      '  <span class="cm">// 初期値 0 から count の型は number と推論される</span>',
      '  <span class="kw">const</span> [<span class="hl">count</span>, <span class="hl">setCount</span>] = <span class="fn">useState</span>(<span class="par">0</span>);',
      '  <span class="kw">return</span> &lt;<span class="fn">button</span> onClick={() => <span class="fn">setCount</span>(count + <span class="par">1</span>)}&gt;{count} 回&lt;/<span class="fn">button</span>&gt;;',
      '}'
    ],
    codeCap:"初期値からcountはnumberと型推論される。クリックのたび setCount が呼ばれ表示が描き直される。",
    yes:["入力フォームの値","開閉・表示/非表示の切替","選択中のタブやアイテム","カウンタや数量","リストへの追加・削除"],
    no:["他の state から計算で出せる値（派生）","描画に関係しない値（→ useRef）","サーバーから来るデータ（→ SWR 等）","複数画面で共有する値（→ Context）","複雑に絡み合う状態（→ useReducer）"],
    noNote:"いちばん大事なのは右側。<strong>計算で導ける値は state にしない</strong>のが、バグの少ない設計の第一歩。",
    miss:[
      ['変数に直接代入すれば画面が変わる','<code>count = count + 1</code> では再描画されない。必ず更新関数 <code>setCount(...)</code> を通す。'],
      ['setState は即座に値を書き換える','更新は<strong>予約</strong>。直後に <code>count</code> を読んでもまだ古い。次の描画で新しい値になる。'],
      ['前の値を使うときも <code>set(値)</code> でいい','連続更新では <code>set(prev => ...)</code> の<strong>関数型更新</strong>が安全。取りこぼしを防ぐ。'],
      ['オブジェクトや配列は一部だけ書き換えていい','<code>arr.push()</code> は検知されない。<code>[...prev, item]</code> で<strong>新しく作る</strong>。']
    ],
    lessons:[
      {id:"modal",  num:"01", ctx:"Webサイト", title:"モーダルの開閉", sub:"boolean 1つの最小状態", ready:true},
      {id:"toggle", num:"02", ctx:"共通",     title:"トグル状態の管理", sub:"関数型更新に出会う", ready:true},
      {id:"search", num:"03", ctx:"業務ツール", title:"検索フォーム入力", sub:"制御コンポーネント・単方向", ready:true},
      {id:"counter",num:"04", ctx:"EC/管理",  title:"数量カウンタ", sub:"前の値依存・下限ガード", ready:true},
      {id:"setting",num:"05", ctx:"管理ツール", title:"設定フォーム", sub:"オブジェクトのスプレッド更新", ready:true},
      {id:"todo",   num:"06", ctx:"業務ツール", title:"TODO 追加/削除", sub:"配列の不変更新・key", ready:true},
    ]
  },

  useContext: {
    name:"useContext",
    cat:"Context / 離れた所で共有する",
    tagline:"props のバケツリレーをやめ、離れたコンポーネントで同じ値を共有する仕組み。",
    lede:"アプリ全体で必要な「テーマ」「ログイン中のユーザー」などを、途中の階層を経由せず直接受け取る。",
    def:'コンポーネントツリーのどこからでも読める<b>共有の値</b>を用意する仕組み。<code>Provider</code> で配り、<code>useContext</code> で受け取る。途中のコンポーネントを<b>経由しなくていい</b>。',
    why:[
      'props は親から子へ1段ずつ手渡す。深い階層の末端に値を届けたいだけなのに、間の全コンポーネントが <code>theme</code> を受け取って下へ渡すだけ……という<strong>バケツリレー</strong>が起きる。',
      'Context は「ツリーのこの範囲で共有する箱」を作る。<code>Provider</code> が値を入れ、その中の<strong>どの深さの子でも</strong> <code>useContext</code> で直接取り出せる。間のコンポーネントは何も知らなくていい。'
    ],
    code:[
      '<span class="cm">// 1. 箱を作る</span>',
      '<span class="kw">const</span> <span class="fn">ThemeContext</span> = <span class="fn">createContext</span>(<span class="str">\'light\'</span>);',
      '',
      '<span class="cm">// 2. Provider で配る（この中なら全員読める）</span>',
      '&lt;<span class="fn">ThemeContext</span>.<span class="fn">Provider</span> value={theme}&gt;',
      '  &lt;<span class="fn">App</span> /&gt;',

const viewEl = document.getElementById('view');
const crumbEl = document.getElementById('crumb');
const atomSVG = `<svg class="atom" viewBox="0 0 100 100"><ellipse class="orb" cx="50" cy="50" rx="44" ry="17"/><ellipse class="orb" cx="50" cy="50" rx="44" ry="17" transform="rotate(60 50 50)"/><ellipse class="orb" cx="50" cy="50" rx="44" ry="17" transform="rotate(120 50 50)"/><circle class="nuc" cx="50" cy="50" r="7"/></svg>`;
// Next.js 編のロゴ（モノクロの三角＝Next ブランドを想起させる簡易マーク）
const nextLogo = `<svg class="atom" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="var(--ink)" stroke-width="5"/><path d="M35 30 V70 M35 30 L66 72 M66 30 V70" stroke="var(--ink)" stroke-width="6" fill="none" stroke-linecap="round"/></svg>`;

function go(path){
  // 各セグメントをエンコード（技術名のスペース等に対応）。先頭スラッシュは保持。
  const enc = path.split('/').map(s => s ? encodeURIComponent(s) : s).join('/');
  location.hash = enc;
}
window.addEventListener('hashchange', route);

// 現在のモード（'react' or 'next'）に応じてデータソースを切り替える
let MODE = 'react';
function curData(){ return MODE==='next' ? NEXT_DATA : DATA; }
function curLessons(){ return MODE==='next' ? NEXT_LESSONS : LESSONS; }
function applyTheme(){
  if(MODE==='next') document.body.classList.add('next-theme');
  else document.body.classList.remove('next-theme');
}

function route(){
  const parts = location.hash.replace(/^#\/?/,'').split('/').filter(Boolean)
    .map(p => decodeURIComponent(p));
  window.scrollTo(0,0);
  // Next.js 名前空間
  if(parts[0]==='next'){
    MODE='next'; applyTheme();
    if(parts.length===1) return renderNextHome();
    if(parts.length===2) return renderConcept(parts[1]);
    return renderLesson(parts[1], parts[2]);
  }
  MODE='react'; applyTheme();
  if(parts.length===0) return renderTopGate();
  if(parts[0]==='react'){
    if(parts.length===1) return renderHome();
    if(parts.length===2) return renderConcept(parts[1]);
    return renderLesson(parts[1], parts[2]);
  }
  // 後方互換: #/useState のような直リンクも React 編として解釈
  if(parts.length===1) return renderConcept(parts[0]);
  return renderLesson(parts[0], parts[1]);
}

  const c = curData()[key];
  if(!c) return MODE==='next' ? renderNextHome() : renderHome();
  const pfx = MODE==='next' ? '/next' : '/react';
  const brand = MODE==='next' ? nextLogo : atomSVG;
  const gateLabel = MODE==='next' ? 'Next.js 編' : '技術一覧';
  crumbEl.innerHTML = `${brand}<a class="crumb" onclick="go('${pfx}')">${gateLabel}</a><span class="sep">/</span><span class="here">${c.name}</span>`;

  const yes = c.yes.map(x=>`<li>${x}</li>`).join('');
  const no  = c.no.map(x=>`<li>${x}</li>`).join('');
  const miss = c.miss.map(m=>`<div class="row"><div class="bad">✕ ${m[0]}</div><div class="fix">${m[1]}</div></div>`).join('');
  const code = c.code.map(l=>`<span class="ln">${l}</span>`).join('');
  const why = c.why.map(p=>`<p>${p}</p>`).join('');
  const cards = c.lessons.map(l=>`
    <a class="lcard ${l.ready?'ready':'soon'}" ${l.ready?`onclick="go('${pfx}/${key}/${l.id}')"`:''}>
      <div class="dnum">${l.num} · ${l.ctx}</div>
      <div class="dttl">${l.title}</div>
      <div class="dsub">${l.sub}</div>
      <div class="darrow">${l.ready?'考え方を学ぶ →':'準備中'}</div>
    </a>`).join('');
  const heading = (MODE!=='next' && c.name.startsWith('use'))
    ? 'use<span class="p">'+c.name.slice(3)+'</span>' : c.name;
  const yesLabel = MODE==='next' ? `${c.name} が向く場面` : `${c.name} が向くもの`;

  viewEl.innerHTML = `
    <div class="hero">
      <div class="kicker">${c.cat}</div>
      <h1>${heading}</h1>
      <p class="lede">${c.tagline} ${c.lede}</p>
      <div class="tags"><span class="tag cat">${c.cat.split(' / ')[0]}</span><span class="tag">考え方 ${c.lessons.length}</span></div>
    </div>
    <section><h2 class="sec">一言でいうと</h2><div class="def">${c.def}</div></section>
    <section><h2 class="sec">なぜ必要か</h2>${why}<div class="code">${code}</div><p class="cap">${c.codeCap}</p></section>
    <section><h2 class="sec">いつ使う / 使わない</h2>
      <div class="cols">
        <div class="col yes"><h3>${yesLabel}</h3><ul>${yes}</ul></div>
        <div class="col no"><h3>${c.name} にしないほうがいい</h3><ul>${no}</ul></div>
      </div>
      <p style="margin-top:14px">${c.noNote}</p>
    </section>
    <section><h2 class="sec">よくある勘違い</h2><div class="miss">${miss}</div></section>
    <section>
      <h2 class="sec">考え方を学ぶ</h2>
      <p style="font-size:14px">${MODE==='next'?'実装の順番をたどって、なぜそうするのかを確かめます。':'同じ '+c.name+' を、文脈を変えて。気になるものから、好きな順で。'}</p>
      <div class="learn-cards">${cards}</div>
    </section>
    <div class="backline"><a onclick="go('${pfx}')">← ${gateLabel}に戻る</a></div>`;
}

/* ---------- LESSON (5 steps) ---------- */
let L=null, cur=0, answered=[], filled={};
function renderLesson(key, lid){
  L = curLessons()[lid];
  if(!L) return renderConcept(key);
  const pfx = MODE==='next' ? '/next' : '/react';
  const brand = MODE==='next' ? nextLogo : atomSVG;
  const gateLabel = MODE==='next' ? 'Next.js 編' : '技術一覧';
  cur=0; answered=new Array(L.steps.length).fill(false); filled={};
  crumbEl.innerHTML = `${brand}<a class="crumb" onclick="go('${pfx}')">${gateLabel}</a><span class="sep">/</span><a class="crumb" onclick="go('${pfx}/${key}')">${key}</a><span class="sep">/</span><span class="here">${L.title}</span>`;
  paintLesson(key);
}
function maxReached(){let m=0;for(let i=0;i<answered.length;i++)if(answered[i])m=i+1;return Math.min(m,L.steps.length-1);}

function buildCode(step){
  if(step.code===null) return `<div class="codeblock"><span class="ln cm">// まだコードは書かない。</span>
<span class="ln cm">// 何を状態に持つかを決める段階。</span></div>`;
  const lines = step.code.map(raw=>{
    let html=raw;
    ['b1','b2','b3'].forEach(slot=>{
      const re=new RegExp(`<span class="${slot}">(.*?)</span>`);
      const m=html.match(re);
      if(m){
        if(filled[slot]) html=html.replace(re,`<span class="fill-anim">${filled[slot]}</span>`);
        else html=html.replace(re,`<span class="blank">${m[1]}</span>`);
      }
    });
    return `<span class="ln">${html}</span>`;
  }).join('');
  return `<div class="codeblock">${lines}</div>`;
}

// 設問ごとに固定の擬似乱数で選択肢順をシャッフル（正解位置を散らす・同じ設問は常に同じ並び）
function seededShuffle(arr, seedStr){
  // 文字列から数値シードを作る
  let seed = 0;
  for(let i=0;i<seedStr.length;i++) seed = (seed*31 + seedStr.charCodeAt(i)) & 0x7fffffff;
  const rng = () => { seed = (seed*1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
  const a = arr.map((v,i)=>({v,i}));
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a.map(x=>x.v);
}

function paintLesson(key){
  const railHead=`<div class="rail-head"><div class="t">${L.title}</div><div class="s">${L.scenario}</div></div>`;
  let rail=railHead;
  L.steps.forEach((s,i)=>{
    const cls = i===cur?'cur':(answered[i]?'done':(i>cur?'locked':''));
    rail+=`<div class="step ${cls}" data-i="${i}"><div class="num">${answered[i]?'✓':(i+1)}</div>
      <div><div class="lbl">${s.lbl}</div><div class="sub2">${s.sub}</div></div></div>`;
    if(i<L.steps.length-1) rail+=`<div class="connector"></div>`;
  });

  const step=L.steps[cur], isAns=answered[cur];
  const shuffledOpts = seededShuffle(step.opts, L.concept+'|'+L.title+'|'+cur);
  const opts=shuffledOpts.map((o,i)=>`<button class="opt ${isAns?'dis':''} ${isAns&&o.ok?'correct':''}" data-ok="${o.ok}">
    <span>${o.t}</span><span class="ic">${o.ok?'✓':'✕'}</span></button>`).join('');

  const last = cur===L.steps.length-1;
  const card = `
    <div class="eyebrow">${step.eyebrow}</div>
    <div class="prompt">${step.prompt}</div>
    ${buildCode(step)}
    <div class="q">${step.question}</div>
    <div class="opts">${opts}</div>
    <div class="why ${isAns?'show':''}" id="why"><div class="h">💡 なぜこの考え方?</div><p>${step.why}</p></div>
    <div class="spacer"></div>
    <div class="nav">
      <button class="btn" id="prev" ${cur===0?'disabled':''}>← 前のステップ</button>
      <button class="btn primary" id="next" ${isAns?'':'disabled'}>${last?'この使い所を完了 ✓':'次のステップ →'}</button>
    </div>`;

  viewEl.innerHTML = `
    <div class="lesson-head">
      <span class="concept">${L.concept}</span>
      <span class="nm">${L.title}</span>
      <span class="sc">· STEP ${cur+1} / ${L.steps.length}</span>
    </div>
    <div class="stage"><div class="rail">${rail}</div><div class="card">${card}</div></div>
    <div class="backline"><a onclick="go('${MODE==='next'?'/next':'/react'}/${key}')">← ${key} の概念ページに戻る</a></div>`;

  viewEl.querySelectorAll('.step').forEach(el=>{
    el.onclick=()=>{const i=+el.dataset.i; if(i<=maxReached()){cur=i;paintLesson(key);}};
  });
  viewEl.querySelectorAll('.opt').forEach(el=>{
    el.onclick=()=>{
      if(answered[cur]) return;
      if(el.dataset.ok==='true'){
        answered[cur]=true;
        if(step.fill) filled[step.fill.slot]=step.fill.val;
        paintLesson(key);
      }else{ el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'),600); }
    };
  });
  const prev=document.getElementById('prev'), next=document.getElementById('next');
  if(prev) prev.onclick=()=>{if(cur>0){cur--;paintLesson(key);}};
  if(next) next.onclick=()=>{ if(!last){cur++;paintLesson(key);} else showDone(key); };
}

function showDone(key){
  const pfx = MODE==='next' ? '/next' : '/react';
  const brand = MODE==='next' ? nextLogo : atomSVG;
  const gateLabel = MODE==='next' ? 'Next.js 編' : '技術一覧';
  crumbEl.innerHTML = `${brand}<a class="crumb" onclick="go('${pfx}')">${gateLabel}</a><span class="sep">/</span><a class="crumb" onclick="go('${pfx}/${key}')">${key}</a><span class="sep">/</span><span class="here">${L.title} ✓</span>`;
  viewEl.innerHTML = `
    <div class="stage" style="grid-template-columns:1fr"><div class="card"><div class="done-banner">
      <div class="big">🎉</div>
      <h3>「${L.title}」完了</h3>
      <p>${L.doneMsg}</p>
      <div class="nav" style="max-width:360px;margin:0 auto">
        <button class="btn" onclick="renderLesson('${key}','${currentLid()}')">もう一度たどる</button>
        <button class="btn primary" onclick="go('${pfx}/${key}')">他の考え方を見る →</button>
      </div>
    </div></div></div>`;
}
function currentLid(){
  const parts = location.hash.replace(/^#\/?/,'').split('/').filter(Boolean).map(p=>decodeURIComponent(p));
  return MODE==='next' ? (parts[2]||'') : (parts[0]==='react' ? (parts[2]||'') : (parts[1]||''));
}

// ルーティングの初期化（全定義の後で実行）。
// load が発火しない環境（iPhone Safari でのローカルHTML等）に備え、
// 読み込み状態に応じて確実に一度 route() を呼ぶ。
window.addEventListener('load', route);
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', route);
} else {
  route();
}
</script>
